<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tmux Viewer</title>
<style>
@font-face {
  font-family: 'JetBrainsMono NF';
  src: url('https://cdn.jsdelivr.net/gh/ryanoasis/nerd-fonts@v3.2.1/patched-fonts/JetBrainsMono/NoLigatures/Regular/JetBrainsMonoNLNerdFont-Regular.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --border: #30363d;
  --text: #c9d1d9;
  --muted: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --sidebar-w: 220px;
  --header-h: 52px;
  --tab-h: 40px;
}

body { background: var(--bg); color: var(--text); font-family: 'JetBrainsMono NF', 'Consolas', 'Courier New', monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

/* ── Header ── */
header {
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 16px; gap: 10px;
  flex-shrink: 0;
}
.logo { font-size: 0.95rem; color: var(--accent); font-weight: 600; letter-spacing: -0.01em; }
.badge { font-size: 0.7rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 99px; padding: 2px 9px; color: var(--muted); }
.ws-dot { width: 7px; height: 7px; border-radius: 50%; background: #484f58; flex-shrink: 0; transition: background .4s; }
.ws-dot.live { background: var(--green); }
#ws-label { font-size: 0.72rem; color: var(--muted); }
.ml-auto { margin-left: auto; }

/* 모바일 메뉴 버튼 */
#menu-btn {
  display: none;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px;
  padding: 5px 10px; font-size: 0.8rem; cursor: pointer;
}

/* ── Layout ── */
.layout { display: flex; flex: 1; overflow: hidden; position: relative; }

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto; flex-shrink: 0;
  transition: transform .25s ease;
}
.session-label {
  font-size: 0.68rem; color: var(--muted); letter-spacing: .08em;
  padding: 10px 14px 4px; text-transform: uppercase;
}
.win-item {
  padding: 8px 14px; cursor: pointer;
  font-size: 0.82rem; border-left: 3px solid transparent;
  display: flex; align-items: center; gap: 8px;
  transition: background .12s;
}
.win-item:hover { background: var(--surface2); }
.win-item.selected { background: var(--surface2); border-left-color: var(--accent); color: var(--accent); }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.dot.off { background: #484f58; }

/* ── Main ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

.pane-tabs {
  height: var(--tab-h); min-height: var(--tab-h);
  background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: stretch;
  overflow-x: auto; flex-shrink: 0;
  scrollbar-width: none;
}
.pane-tabs::-webkit-scrollbar { display: none; }
.pane-tab {
  padding: 0 16px; font-size: 0.78rem; cursor: pointer;
  border-bottom: 2px solid transparent; color: var(--muted);
  white-space: nowrap; display: flex; align-items: center;
  transition: color .12s;
}
.pane-tab:hover { color: var(--text); }
.pane-tab.selected { color: var(--accent); border-bottom-color: var(--accent); }

.terminal {
  flex: 1; overflow-y: auto; overflow-x: auto;
  padding: 14px 16px;
  background: var(--bg);
}
pre {
  font-family: 'JetBrainsMono NF', 'Consolas', 'Courier New', monospace;
  font-size: 0.8rem; line-height: 1.6;
  white-space: pre-wrap; word-break: break-all;
  color: var(--text);
}
.empty { color: var(--muted); font-size: 0.82rem; padding: 28px 0; }

/* 모바일 오버레이 */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.5); z-index: 9;
}

/* ── Mobile ── */
@media (max-width: 640px) {
  :root { --sidebar-w: 80vw; }
  #menu-btn { display: block; }

  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0;
    z-index: 10; transform: translateX(-100%);
  }
  .sidebar.open { transform: translateX(0); }
  .overlay.open { display: block; }

  pre { font-size: 0.74rem; }
  .pane-tab { padding: 0 12px; font-size: 0.74rem; }
}
</style>
</head>
<body>

<header>
  <button id="menu-btn" onclick="toggleSidebar()">☰</button>
  <span class="logo">⬛ tmux</span>
  <span class="badge" id="session-count">{{ sessions|length }} sessions</span>
  <span class="ws-dot" id="ws-dot"></span>
  <span id="ws-label">연결 중…</span>
  <span class="ml-auto" style="font-size:.72rem;color:var(--muted)" id="last-update"></span>
</header>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="pane-tabs" id="pane-tabs"></div>
    <div class="terminal" id="terminal"><p class="empty">← 세션을 선택하세요.</p></div>
  </div>
</div>

<script>
let sessions = {{ sessions | tojson }};
let sel = { session: null, window: null, pane: null };
let ws = null;

// ── 사이드바 토글 (모바일) ──────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ── WebSocket ────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('ws-dot').classList.add('live');
    document.getElementById('ws-label').textContent = '실시간';
  };

  ws.onmessage = (e) => {
    sessions = JSON.parse(e.data);
    document.getElementById('session-count').textContent = sessions.length + ' sessions';
    document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
    renderSidebar();
    refreshMain();
  };

  ws.onclose = () => {
    document.getElementById('ws-dot').classList.remove('live');
    document.getElementById('ws-label').textContent = '끊김 — 재연결 중…';
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => ws.close();
}

// ── 렌더 ─────────────────────────────────────────
function getWin(sName, wIdx) {
  const s = sessions.find(s => s.name === sName);
  return s ? s.windows.find(w => w.index === wIdx) : null;
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  if (!sessions.length) {
    sb.innerHTML = '<p class="empty" style="padding:16px">세션 없음</p>';
    return;
  }
  sessions.forEach(s => {
    const lbl = document.createElement('div');
    lbl.className = 'session-label';
    lbl.textContent = s.name;
    sb.appendChild(lbl);

    s.windows.forEach(w => {
      const item = document.createElement('div');
      const isSelected = sel.session === s.name && sel.window === w.index;
      item.className = 'win-item' + (isSelected ? ' selected' : '');
      item.innerHTML = `<span class="dot ${w.active ? '' : 'off'}"></span>${w.index}: ${esc(w.name)}`;
      item.onclick = () => {
        sel = { session: s.name, window: w.index, pane: w.panes[0]?.index ?? null };
        closeSidebar();
        renderSidebar();
        const win = getWin(s.name, w.index);
        if (win) { renderTabs(win); renderTerminal(win); }
      };
      sb.appendChild(item);
    });
  });
}

function refreshMain() {
  if (!sel.session) return;
  const win = getWin(sel.session, sel.window);
  if (!win) return;
  renderTabs(win);
  renderTerminal(win);
}

function renderTabs(win) {
  const tabs = document.getElementById('pane-tabs');
  tabs.innerHTML = '';
  win.panes.forEach(p => {
    const tab = document.createElement('div');
    tab.className = 'pane-tab' + (p.index === sel.pane ? ' selected' : '');
    tab.textContent = `pane ${p.index}${p.title ? ': ' + p.title : ''}`;
    tab.onclick = () => { sel.pane = p.index; renderTabs(win); renderTerminal(win); };
    tabs.appendChild(tab);
  });
}

function renderTerminal(win) {
  const term = document.getElementById('terminal');
  const pane = win.panes.find(p => p.index === sel.pane) ?? win.panes[0];
  if (!pane) { term.innerHTML = '<p class="empty">팬 없음</p>'; return; }

  const atBottom = term.scrollHeight - term.scrollTop - term.clientHeight < 40;
  term.innerHTML = `<pre>${esc(pane.content)}</pre>`;
  if (atBottom) term.scrollTop = term.scrollHeight;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 초기화 ───────────────────────────────────────
renderSidebar();
connectWS();
</script>
</body>
</html>
